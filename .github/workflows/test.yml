{
  "name": "Test",
  "on": {
    "workflow_dispatch": {},
    "pull_request": {
      "branches": [
        "main",
        "develop-*"
      ],
      "types": [
        "opened",
        "edited",
        "reopened",
        "ready_for_review",
        "synchronize"
      ]
    }
  },
  "env": {
    "CARGO_TERM_COLOR": "always"
  },
  "jobs": {
    "msrv": {
      "runs-on": "ubuntu-latest",
      "steps": [
        {
          "uses": "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0"
        },
        {
          "name": "Install Rust 1.83",
          "uses": "dtolnay/rust-toolchain@bd41891a8e7f4b8649f6d684415e1a6155fe4e22",
          "with": {
            "toolchain": "1.83.0"
          }
        },
        {
          "name": "rustc",
          "run": "rustc --version"
        },
        {
          "name": "cargo",
          "run": "cargo --version"
        },
        {
          "name": "Update dependencies",
          "run": "cargo +stable update --config 'resolver.incompatible-rust-versions=\"fallback\"'"
        },
        {
          "name": "Check MSRV with arrow-53",
          "run": "cargo +1.83.0 check --package serde_arrow --features arrow-53"
        }
      ]
    },
    "build": {
      "runs-on": "ubuntu-latest",
      "steps": [
        {
          "uses": "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0"
        },
        {
          "name": "Install uv",
          "uses": "astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39",
          "with": {
            "enable-cache": true
          }
        },
        {
          "name": "rustc",
          "run": "rustc --version"
        },
        {
          "name": "cargo",
          "run": "cargo --version"
        },
        {
          "name": "Check",
          "run": "cargo check"
        },
        {
          "name": "Check arrow2-0-17",
          "run": "cargo check --all-targets --features arrow2-0-17"
        },
        {
          "name": "Check arrow2-0-16",
          "run": "cargo check --all-targets --features arrow2-0-16"
        },
        {
          "name": "Check arrow-59",
          "run": "cargo check --all-targets --features arrow-59"
        },
        {
          "name": "Check arrow-58",
          "run": "cargo check --all-targets --features arrow-58"
        },
        {
          "name": "Check arrow-57",
          "run": "cargo check --all-targets --features arrow-57"
        },
        {
          "name": "Check arrow-56",
          "run": "cargo check --all-targets --features arrow-56"
        },
        {
          "name": "Check arrow-55",
          "run": "cargo check --all-targets --features arrow-55"
        },
        {
          "name": "Check arrow-54",
          "run": "cargo check --all-targets --features arrow-54"
        },
        {
          "name": "Check arrow-53",
          "run": "cargo check --all-targets --features arrow-53"
        },
        {
          "name": "Check arrow-52",
          "run": "cargo check --all-targets --features arrow-52"
        },
        {
          "name": "Check arrow-51",
          "run": "cargo check --all-targets --features arrow-51"
        },
        {
          "name": "Check arrow-50",
          "run": "cargo check --all-targets --features arrow-50"
        },
        {
          "name": "Check arrow-50",
          "run": "cargo check --all-targets --features arrow-50"
        },
        {
          "name": "Check arrow-49",
          "run": "cargo check --all-targets --features arrow-49"
        },
        {
          "name": "Check arrow-48",
          "run": "cargo check --all-targets --features arrow-48"
        },
        {
          "name": "Check arrow-47",
          "run": "cargo check --all-targets --features arrow-47"
        },
        {
          "name": "Check arrow-46",
          "run": "cargo check --all-targets --features arrow-46"
        },
        {
          "name": "Check arrow-45",
          "run": "cargo check --all-targets --features arrow-45"
        },
        {
          "name": "Check arrow-44",
          "run": "cargo check --all-targets --features arrow-44"
        },
        {
          "name": "Check arrow-43",
          "run": "cargo check --all-targets --features arrow-43"
        },
        {
          "name": "Check arrow-42",
          "run": "cargo check --all-targets --features arrow-42"
        },
        {
          "name": "Check arrow-41",
          "run": "cargo check --all-targets --features arrow-41"
        },
        {
          "name": "Check arrow-40",
          "run": "cargo check --all-targets --features arrow-40"
        },
        {
          "name": "Check arrow-39",
          "run": "cargo check --all-targets --features arrow-39"
        },
        {
          "name": "Check arrow-38",
          "run": "cargo check --all-targets --features arrow-38"
        },
        {
          "name": "Check arrow-37",
          "run": "cargo check --all-targets --features arrow-37"
        },
        {
          "name": "Check support packages",
          "run": "cargo check --all-features --package bench --package example --package integration_tests"
        },
        {
          "name": "Check format",
          "run": "cargo fmt --check"
        },
        {
          "name": "Build",
          "run": "cargo build --features arrow2-0-17,arrow-59"
        },
        {
          "name": "Test",
          "run": "cargo test --features arrow2-0-17,arrow-59"
        },
        {
          "name": "Integration test",
          "run": "uv run python x.py test-integration"
        }
      ]
    }
  }
}