{
  "name": "Test",
  "on": {
    "workflow_dispatch": {},
    "pull_request": {
      "branches": [
        "main",
        "develop-*"
      ],
      "types": [
        "opened",
        "edited",
        "reopened",
        "ready_for_review",
        "synchronize"
      ]
    }
  },
  "env": {
    "CARGO_TERM_COLOR": "always"
  },
  "jobs": {
    "msrv": {
      "runs-on": "ubuntu-latest",
      "steps": [
        {
          "uses": "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0"
        },
        {
          "name": "Install Rust 1.83",
          "uses": "dtolnay/rust-toolchain@bd41891a8e7f4b8649f6d684415e1a6155fe4e22",
          "with": {
            "toolchain": "1.83.0"
          }
        },
        {
          "name": "rustc",
          "run": "rustc --version"
        },
        {
          "name": "cargo",
          "run": "cargo --version"
        },
        {
          "name": "Update dependencies",
          "run": "cargo +stable update --config 'resolver.incompatible-rust-versions=\"fallback\"'"
        },
        {
          "name": "Check MSRV with arrow-53",
          "run": "cargo +1.83.0 check --package serde_arrow --features arrow-53"
        }
      ]
    },
    "test": {
      "runs-on": "ubuntu-latest",
      "steps": [
        {
          "uses": "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0"
        },
        {
          "name": "Install uv",
          "uses": "astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39",
          "with": {
            "enable-cache": true
          }
        },
        {
          "name": "rustc",
          "run": "rustc --version"
        },
        {
          "name": "cargo",
          "run": "cargo --version"
        },
        {
          "name": "Check Cargo.toml",
          "run": "uv run python scripts/check-cargo-toml.py"
        },
        {
          "name": "Check",
          "run": "cargo check"
        },
        {
          "name": "Check marrow serde",
          "run": "cargo check --all-targets --package marrow --features serde"
        },
        {
          "name": "Check marrow arrow-59",
          "run": "cargo check --all-targets --package marrow --features arrow-59"
        },
        {
          "name": "Check marrow arrow-58",
          "run": "cargo check --all-targets --package marrow --features arrow-58"
        },
        {
          "name": "Check marrow arrow-57",
          "run": "cargo check --all-targets --package marrow --features arrow-57"
        },
        {
          "name": "Check marrow arrow-56",
          "run": "cargo check --all-targets --package marrow --features arrow-56"
        },
        {
          "name": "Check marrow arrow-55",
          "run": "cargo check --all-targets --package marrow --features arrow-55"
        },
        {
          "name": "Check marrow arrow-54",
          "run": "cargo check --all-targets --package marrow --features arrow-54"
        },
        {
          "name": "Check marrow arrow-53",
          "run": "cargo check --all-targets --package marrow --features arrow-53"
        },
        {
          "name": "Check serde_arrow arrow-59",
          "run": "cargo check --all-targets --package serde_arrow --features arrow-59"
        },
        {
          "name": "Check serde_arrow arrow-58",
          "run": "cargo check --all-targets --package serde_arrow --features arrow-58"
        },
        {
          "name": "Check serde_arrow arrow-57",
          "run": "cargo check --all-targets --package serde_arrow --features arrow-57"
        },
        {
          "name": "Check serde_arrow arrow-56",
          "run": "cargo check --all-targets --package serde_arrow --features arrow-56"
        },
        {
          "name": "Check serde_arrow arrow-55",
          "run": "cargo check --all-targets --package serde_arrow --features arrow-55"
        },
        {
          "name": "Check serde_arrow arrow-54",
          "run": "cargo check --all-targets --package serde_arrow --features arrow-54"
        },
        {
          "name": "Check serde_arrow arrow-53",
          "run": "cargo check --all-targets --package serde_arrow --features arrow-53"
        },
        {
          "name": "Check support packages",
          "run": "cargo check --all-features --package serde_arrow_bench --package serde_arrow_example --package serde_arrow_integration --package marrow_integration"
        },
        {
          "name": "Clippy serde_arrow",
          "run": "cargo clippy --all-targets --package serde_arrow --features arrow-59"
        },
        {
          "name": "Clippy marrow",
          "run": "cargo clippy --all-targets --package marrow --features serde,arrow-59"
        },
        {
          "name": "Clippy support packages",
          "run": "cargo clippy --all-targets --all-features --package serde_arrow_bench --package serde_arrow_example --package serde_arrow_integration --package marrow_integration"
        },
        {
          "name": "Check Python format",
          "run": "uv run ruff format --check x.py"
        },
        {
          "name": "Check format",
          "run": "cargo fmt --check"
        },
        {
          "name": "Check generated Rust format",
          "run": "rustfmt --check marrow/src/impl_arrow/impl_api_53.rs marrow/src/impl_arrow/impl_api_base.rs marrow_integration/src/tests/arrays.rs marrow_integration/src/tests/data_types.rs marrow_integration/src/tests/fixed_size_binary_arrays.rs marrow_integration/src/tests/intervals.rs marrow_integration/src/tests/struct_arrays.rs marrow_integration/src/tests/union_arrays.rs marrow_integration/src/tests/utils.rs marrow_integration/src/tests/views.rs"
        },
        {
          "name": "Build",
          "run": "cargo build --package serde_arrow --package marrow --features serde_arrow/arrow-59,marrow/serde,marrow/arrow-59"
        },
        {
          "name": "Test",
          "run": "cargo test --package serde_arrow --package marrow --features serde_arrow/arrow-59,marrow/serde,marrow/arrow-59"
        },
        {
          "name": "Integration test",
          "run": "cargo test -p serde_arrow_integration"
        },
        {
          "name": "Run example",
          "run": "cargo run -p serde_arrow_example"
        },
        {
          "name": "Read example output",
          "run": "uv run python -c 'import polars as pl; print(pl.read_ipc(\"serde_arrow_example.ipc\"))'"
        }
      ]
    }
  }
}