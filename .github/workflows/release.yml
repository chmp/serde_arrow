{
  "name": "Release",
  "on": {
    "release": {
      "types": [
        "published"
      ]
    }
  },
  "env": {
    "CARGO_TERM_COLOR": "always"
  },
  "jobs": {
    "build": {
      "runs-on": "ubuntu-latest",
      "environment": "release",
      "permissions": {
        "id-token": "write"
      },
      "steps": [
        {
          "uses": "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0"
        },
        {
          "name": "Install uv",
          "uses": "astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39",
          "with": {
            "enable-cache": true
          }
        },
        {
          "name": "rustc",
          "run": "rustc --version"
        },
        {
          "name": "cargo",
          "run": "cargo --version"
        },
        {
          "name": "Check",
          "run": "cargo check"
        },
        {
          "name": "Check arrow-59",
          "run": "cargo check --all-targets --features arrow-59"
        },
        {
          "name": "Check arrow-58",
          "run": "cargo check --all-targets --features arrow-58"
        },
        {
          "name": "Check arrow-57",
          "run": "cargo check --all-targets --features arrow-57"
        },
        {
          "name": "Check arrow-56",
          "run": "cargo check --all-targets --features arrow-56"
        },
        {
          "name": "Check arrow-55",
          "run": "cargo check --all-targets --features arrow-55"
        },
        {
          "name": "Check arrow-54",
          "run": "cargo check --all-targets --features arrow-54"
        },
        {
          "name": "Check arrow-53",
          "run": "cargo check --all-targets --features arrow-53"
        },
        {
          "name": "Check support packages",
          "run": "cargo check --all-features --package bench --package example --package integration_tests"
        },
        {
          "name": "Check format",
          "run": "cargo fmt --check"
        },
        {
          "name": "Build",
          "run": "cargo build --features arrow-59"
        },
        {
          "name": "Test",
          "run": "cargo test --features arrow-59"
        },
        {
          "name": "Integration test",
          "run": "uv run python x.py test-integration"
        },
        {
          "name": "Auth with crates.io",
          "uses": "rust-lang/crates-io-auth-action@v1",
          "id": "auth"
        },
        {
          "name": "Publish to crates.io",
          "working-directory": "serde_arrow",
          "run": "cargo publish",
          "env": {
            "CARGO_REGISTRY_TOKEN": "${{ steps.auth.outputs.token }}"
          }
        }
      ]
    }
  }
}