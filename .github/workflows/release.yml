{
  "name": "Release",
  "on": {
    "push": {
      "tags": [
        "marrow/v*.*.*",
        "serde_arrow/v*.*.*"
      ]
    }
  },
  "env": {
    "CARGO_TERM_COLOR": "always"
  },
  "jobs": {
    "marrow": {
      "runs-on": "ubuntu-latest",
      "environment": "release",
      "permissions": {
        "id-token": "write"
      },
      "if": "startsWith(github.ref_name, 'marrow/v')",
      "steps": [
        {
          "uses": "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0"
        },
        {
          "name": "rustc",
          "run": "rustc --version"
        },
        {
          "name": "cargo",
          "run": "cargo --version"
        },
        {
          "name": "Validate release tag",
          "shell": "bash",
          "run": "tag=\"${GITHUB_REF_NAME}\"\ncrate=\"marrow\"\nexpected_prefix=\"marrow/v\"\nversion=\"${tag#${expected_prefix}}\"\nif [ \"${tag}\" = \"${version}\" ]; then\n  echo \"tag ${tag} does not start with ${expected_prefix}\" >&2\n  exit 1\nfi\nactual=\"$(python3 - \"${crate}\" <<'PY'\nimport pathlib\nimport sys\nimport tomllib\n\ncrate = sys.argv[1]\nwith open(pathlib.Path(crate) / \"Cargo.toml\", \"rb\") as fobj:\n    print(tomllib.load(fobj)[\"package\"][\"version\"])\nPY\n)\"\nif [ \"${actual}\" != \"${version}\" ]; then\n  echo \"tag version ${version} does not match ${crate} package version ${actual}\" >&2\n  exit 1\nfi"
        },
        {
          "name": "Check marrow",
          "run": "cargo check --all-targets --package marrow"
        },
        {
          "name": "Check marrow serde",
          "run": "cargo check --all-targets --package marrow --features serde"
        },
        {
          "name": "Check marrow arrow2-0-17",
          "run": "cargo check --all-targets --package marrow --features arrow2-0-17"
        },
        {
          "name": "Check marrow arrow2-0-16",
          "run": "cargo check --all-targets --package marrow --features arrow2-0-16"
        },
        {
          "name": "Check marrow arrow-59",
          "run": "cargo check --all-targets --package marrow --features arrow-59"
        },
        {
          "name": "Check marrow arrow-58",
          "run": "cargo check --all-targets --package marrow --features arrow-58"
        },
        {
          "name": "Check marrow arrow-57",
          "run": "cargo check --all-targets --package marrow --features arrow-57"
        },
        {
          "name": "Check marrow arrow-56",
          "run": "cargo check --all-targets --package marrow --features arrow-56"
        },
        {
          "name": "Check marrow arrow-55",
          "run": "cargo check --all-targets --package marrow --features arrow-55"
        },
        {
          "name": "Check marrow arrow-54",
          "run": "cargo check --all-targets --package marrow --features arrow-54"
        },
        {
          "name": "Check marrow arrow-53",
          "run": "cargo check --all-targets --package marrow --features arrow-53"
        },
        {
          "name": "Check marrow arrow-52",
          "run": "cargo check --all-targets --package marrow --features arrow-52"
        },
        {
          "name": "Check marrow arrow-51",
          "run": "cargo check --all-targets --package marrow --features arrow-51"
        },
        {
          "name": "Check marrow arrow-50",
          "run": "cargo check --all-targets --package marrow --features arrow-50"
        },
        {
          "name": "Check marrow arrow-49",
          "run": "cargo check --all-targets --package marrow --features arrow-49"
        },
        {
          "name": "Check marrow arrow-48",
          "run": "cargo check --all-targets --package marrow --features arrow-48"
        },
        {
          "name": "Check marrow arrow-47",
          "run": "cargo check --all-targets --package marrow --features arrow-47"
        },
        {
          "name": "Check marrow arrow-46",
          "run": "cargo check --all-targets --package marrow --features arrow-46"
        },
        {
          "name": "Check marrow arrow-45",
          "run": "cargo check --all-targets --package marrow --features arrow-45"
        },
        {
          "name": "Check marrow arrow-44",
          "run": "cargo check --all-targets --package marrow --features arrow-44"
        },
        {
          "name": "Check marrow arrow-43",
          "run": "cargo check --all-targets --package marrow --features arrow-43"
        },
        {
          "name": "Check marrow arrow-42",
          "run": "cargo check --all-targets --package marrow --features arrow-42"
        },
        {
          "name": "Check marrow arrow-41",
          "run": "cargo check --all-targets --package marrow --features arrow-41"
        },
        {
          "name": "Check marrow arrow-40",
          "run": "cargo check --all-targets --package marrow --features arrow-40"
        },
        {
          "name": "Check marrow arrow-39",
          "run": "cargo check --all-targets --package marrow --features arrow-39"
        },
        {
          "name": "Check marrow arrow-38",
          "run": "cargo check --all-targets --package marrow --features arrow-38"
        },
        {
          "name": "Check marrow arrow-37",
          "run": "cargo check --all-targets --package marrow --features arrow-37"
        },
        {
          "name": "Test marrow",
          "run": "cargo test --package marrow --features serde,arrow2-0-17,arrow-59"
        },
        {
          "name": "Package marrow",
          "run": "cargo package -p marrow --allow-dirty"
        },
        {
          "name": "Auth with crates.io",
          "uses": "rust-lang/crates-io-auth-action@v1",
          "id": "auth"
        },
        {
          "name": "Publish to crates.io",
          "run": "cargo publish -p marrow",
          "env": {
            "CARGO_REGISTRY_TOKEN": "${{ steps.auth.outputs.token }}"
          }
        }
      ]
    },
    "serde_arrow": {
      "runs-on": "ubuntu-latest",
      "environment": "release",
      "permissions": {
        "id-token": "write"
      },
      "if": "startsWith(github.ref_name, 'serde_arrow/v')",
      "steps": [
        {
          "uses": "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0"
        },
        {
          "name": "rustc",
          "run": "rustc --version"
        },
        {
          "name": "cargo",
          "run": "cargo --version"
        },
        {
          "name": "Validate release tag",
          "shell": "bash",
          "run": "tag=\"${GITHUB_REF_NAME}\"\ncrate=\"serde_arrow\"\nexpected_prefix=\"serde_arrow/v\"\nversion=\"${tag#${expected_prefix}}\"\nif [ \"${tag}\" = \"${version}\" ]; then\n  echo \"tag ${tag} does not start with ${expected_prefix}\" >&2\n  exit 1\nfi\nactual=\"$(python3 - \"${crate}\" <<'PY'\nimport pathlib\nimport sys\nimport tomllib\n\ncrate = sys.argv[1]\nwith open(pathlib.Path(crate) / \"Cargo.toml\", \"rb\") as fobj:\n    print(tomllib.load(fobj)[\"package\"][\"version\"])\nPY\n)\"\nif [ \"${actual}\" != \"${version}\" ]; then\n  echo \"tag version ${version} does not match ${crate} package version ${actual}\" >&2\n  exit 1\nfi"
        },
        {
          "name": "Check serde_arrow",
          "run": "cargo check --all-targets --package serde_arrow"
        },
        {
          "name": "Check serde_arrow arrow-59",
          "run": "cargo check --all-targets --package serde_arrow --features arrow-59"
        },
        {
          "name": "Check serde_arrow arrow-58",
          "run": "cargo check --all-targets --package serde_arrow --features arrow-58"
        },
        {
          "name": "Check serde_arrow arrow-57",
          "run": "cargo check --all-targets --package serde_arrow --features arrow-57"
        },
        {
          "name": "Check serde_arrow arrow-56",
          "run": "cargo check --all-targets --package serde_arrow --features arrow-56"
        },
        {
          "name": "Check serde_arrow arrow-55",
          "run": "cargo check --all-targets --package serde_arrow --features arrow-55"
        },
        {
          "name": "Check serde_arrow arrow-54",
          "run": "cargo check --all-targets --package serde_arrow --features arrow-54"
        },
        {
          "name": "Check serde_arrow arrow-53",
          "run": "cargo check --all-targets --package serde_arrow --features arrow-53"
        },
        {
          "name": "Test serde_arrow",
          "run": "cargo test --package serde_arrow --features arrow-59"
        },
        {
          "name": "Package serde_arrow",
          "run": "cargo package -p serde_arrow --allow-dirty"
        },
        {
          "name": "Auth with crates.io",
          "uses": "rust-lang/crates-io-auth-action@v1",
          "id": "auth"
        },
        {
          "name": "Publish to crates.io",
          "run": "cargo publish -p serde_arrow",
          "env": {
            "CARGO_REGISTRY_TOKEN": "${{ steps.auth.outputs.token }}"
          }
        }
      ]
    }
  }
}